<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Musical Magic — handmade tees, with a touch of sparkle.">
  <title>Musical Magic</title>
  <link rel="icon" href="logo.jpg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <img src="logo.jpg" alt="Musical Magic logo">
      <div class="brand-name">Musical Magic<small>handmade tees</small></div>
    </a>
    <nav class="nav">
      <a href="index.html">Shop</a>
    </nav>
  </header>

  <main class="page">
    <a href="index.html" class="back-link">← Back to shop</a>
    <section id="product" class="product"></section>
    <div id="missing" class="empty" hidden>That tee doesn't exist. <a href="index.html">Back to the shop</a>.</div>
  </main>

  <footer class="admin-footer">
    <a href="admin.html">Admin</a>
  </footer>

  <script>
    const params = new URLSearchParams(location.search);
    const wantId = params.get("id");

    fetch("tshirts.json", { cache: "no-store" })
      .then(r => r.json())
      .then(data => {
        const items = data.tshirts || [];
        const t = items.find(x => x.id === wantId);
        if (!t) {
          document.getElementById("product").hidden = true;
          document.getElementById("missing").hidden = false;
          return;
        }
        render(t);
        document.title = t.name + " — Musical Magic";
      })
      .catch(() => {
        document.getElementById("product").hidden = true;
        document.getElementById("missing").hidden = false;
      });

    const SIZE_ORDER = ["S","M","L","XL","XXL"];

    function render(t) {
      t = normalize(t);
      const initial = (t.name || "?").charAt(0).toUpperCase();

      // Gallery: hero image + thumbnail strip if there's more than one.
      let galleryHtml;
      if (t.images.length > 0) {
        const thumbs = t.images.length > 1 ? `
          <div class="product-thumbs">
            ${t.images.map((img, i) => `
              <button class="product-thumb${i === 0 ? ' active' : ''}" data-img="${escapeHtml(img)}" type="button" aria-label="Image ${i + 1}">
                <img src="${escapeHtml(img)}" alt="">
              </button>
            `).join("")}
          </div>` : "";
        galleryHtml = `
          <div class="product-gallery">
            <div class="product-image">
              <img id="heroImg" src="${escapeHtml(t.images[0])}" alt="${escapeHtml(t.name)}">
            </div>
            ${thumbs}
          </div>`;
      } else {
        galleryHtml = `<div class="product-image"><div class="placeholder">${escapeHtml(initial)}</div></div>`;
      }

      // Size picker — every size shown, unavailable ones disabled + struck through.
      const sizesHtml = t.anyAvailable ? `
        <div class="size-picker">
          <div class="size-picker-label">Size</div>
          <div class="size-buttons">
            ${SIZE_ORDER.map(s => `
              <button class="size-btn${t.sizes[s] ? "" : " unavailable"}"
                      data-size="${s}"
                      ${t.sizes[s] ? "" : "disabled"}
                      type="button"
                      aria-label="Size ${s}${t.sizes[s] ? "" : " (out of stock)"}">${s}</button>
            `).join("")}
          </div>
        </div>` : `<div class="out-of-stock-msg">Currently out of stock — check back soon.</div>`;

      const ctaHtml = t.anyAvailable
        ? `<button class="btn" id="orderBtn" type="button" disabled>Pick a size to order</button>` : "";

      document.getElementById("product").innerHTML = `
        ${galleryHtml}
        <div class="product-info">
          <h1>${escapeHtml(t.name || "")}</h1>
          <div class="product-price">£${formatPrice(t.price)}</div>
          <p class="product-description">${escapeHtml(t.description || "")}</p>
          ${sizesHtml}
          ${ctaHtml}
        </div>
      `;

      // Wire the gallery thumbnails — click swaps the hero image.
      document.querySelectorAll(".product-thumb").forEach(btn => {
        btn.addEventListener("click", () => {
          document.getElementById("heroImg").src = btn.dataset.img;
          document.querySelectorAll(".product-thumb").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
        });
      });

      // Wire the size picker — click selects, enabling the order button + size-aware mailto.
      let selectedSize = null;
      document.querySelectorAll(".size-btn:not(.unavailable)").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedSize = btn.dataset.size;
          document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          const orderBtn = document.getElementById("orderBtn");
          if (orderBtn) {
            orderBtn.disabled = false;
            orderBtn.textContent = `Email to order — size ${selectedSize}`;
            orderBtn.onclick = () => {
              const subject = `Order: ${t.name} (size ${selectedSize})`;
              const body = `I'd like to order the ${t.name} tee in size ${selectedSize}.`;
              window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            };
          }
        });
      });
    }

    function normalize(t) {
      const images = (Array.isArray(t.images) && t.images.length)
        ? t.images.filter(x => x)
        : (t.image ? [t.image] : []);
      let sizes;
      if (t.sizes && typeof t.sizes === "object") {
        sizes = {
          S:   !!t.sizes.S,   M:   !!t.sizes.M,   L:   !!t.sizes.L,
          XL:  !!t.sizes.XL,  XXL: !!t.sizes.XXL,
        };
      } else {
        const a = t.available !== false;
        sizes = { S: a, M: a, L: a, XL: a, XXL: a };
      }
      const anyAvailable = Object.values(sizes).some(v => v);
      return { ...t, images, sizes, anyAvailable };
    }

    function formatPrice(p) {
      const n = Number(p);
      if (!isFinite(n)) return "—";
      return n.toFixed(2);
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      })[c]);
    }
  </script>
</body>
</html>
